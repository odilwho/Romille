<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Cozy Farm UI</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="game-container">
        <div class="status-bar">
            <div class="profile-frame">
                <div class="avatar"></div>
            </div>
            <div class="stats">
                <div class="bar-container">
                    <span>HP</span>
                    <div class="bar health"><div class="fill" style="width: 80%;"></div></div>
                </div>
                <div class="bar-container">
                    <span>STAMINA</span>
                    <div class="bar stamina"><div class="fill" style="width: 60%;"></div></div>
                </div>
            </div>
            <div class="currency-tag">
                🪙 <span id="gold-count">001250</span>
            </div>
        </div>

        <main class="journal">
            <h1>Daily Tasks</h1>
            <p>Don't forget to water the sunflowers!</p>
            <div class="sticker">Hazardous Waste</div>
        </main>

        <div class="inventory">
            <div class="slot active" onclick="selectSlot(this)">🌱</div>
            <div class="slot" onclick="selectSlot(this)">💧</div>
            <div class="slot" onclick="selectSlot(this)">🍎</div>
            <div class="slot" onclick="selectSlot(this)">🪓</div>
            <div class="slot" onclick="selectSlot(this)">🪄</div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
